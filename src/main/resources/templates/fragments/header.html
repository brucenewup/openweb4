<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <header th:fragment="nav(current)" class="sidebar-header">
    <style>
      .sidebar-header {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 0;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        width: 220px;
        flex-shrink: 0;
        position: relative;
        overflow: hidden;
      }
      .sidebar-header::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background:
          linear-gradient(180deg, rgba(0,240,255,0.03) 0%, transparent 40%),
          linear-gradient(0deg, rgba(0,102,255,0.05) 0%, transparent 30%);
        pointer-events: none;
        z-index: 0;
      }
      .sidebar-logo-wrap {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 16px 14px;
        border-bottom: 1px solid var(--border);
        position: relative;
        z-index: 1;
      }
      .sidebar-logo-wrap::after {
        content: '';
        position: absolute;
        bottom: 0; left: 16px; right: 16px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
        opacity: 0.4;
      }
      .logo-icon {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, rgba(0,240,255,0.15), rgba(0,102,255,0.25));
        border: 1px solid rgba(0,240,255,0.3);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        box-shadow: 0 0 12px rgba(0,240,255,0.15);
      }
      .sidebar-app-name {
        font-size: 15px;
        font-weight: 700;
        color: var(--fg);
        text-decoration: none;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .theme-toggle-btn {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 4px 8px;
        cursor: pointer;
        font-size: 14px;
        color: var(--fg);
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .theme-toggle-btn:hover {
        border-color: var(--neon-cyan);
        box-shadow: 0 0 8px rgba(0,240,255,0.2);
      }
      .sidebar-nav {
        display: flex;
        flex-direction: column;
        gap: 2px;
        flex: 1;
        padding: 12px 10px;
        position: relative;
        z-index: 1;
      }
      .nav-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid transparent;
        background: transparent;
        color: var(--muted);
        font-size: 13.5px;
        font-weight: 500;
        font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
        cursor: pointer;
        transition: all 0.2s ease;
        text-decoration: none;
        position: relative;
      }
      .nav-btn:hover {
        background: rgba(0,240,255,0.06);
        color: var(--fg);
        border-color: rgba(0,240,255,0.15);
      }
      .nav-btn.active {
        background: linear-gradient(135deg, rgba(0,240,255,0.12), rgba(0,102,255,0.18));
        color: var(--neon-cyan);
        font-weight: 600;
        border-color: rgba(0,240,255,0.3);
        box-shadow: 0 0 16px rgba(0,240,255,0.1), inset 0 0 12px rgba(0,240,255,0.05);
      }
      .nav-btn.active svg { stroke: var(--neon-cyan); }
      .sidebar-footer {
        border-top: 1px solid var(--border);
        padding: 12px 16px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        position: relative;
        z-index: 1;
      }
      .sidebar-footer::before {
        content: '';
        position: absolute;
        top: 0; left: 16px; right: 16px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
        opacity: 0.3;
      }
      .sidebar-version {
        font-size: 11px;
        color: var(--muted);
        text-align: center;
        opacity: 0.6;
        letter-spacing: 0.5px;
        font-family: 'JetBrains Mono', monospace;
      }
      .lang-switch {
        display: flex;
        gap: 6px;
        justify-content: center;
        font-size: 12px;
        color: var(--muted);
      }
      .lang-switch a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
      .lang-switch a:hover { color: var(--neon-cyan); }
    </style>
    <div class="sidebar-logo-wrap">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00f0ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <a th:href="@{/dashboard}" class="sidebar-app-name" th:text="#{nav.appName}">链上监控</a>
      </div>
      <button id="themeToggle" onclick="(function(){
        var root=document.documentElement;
        var next=root.dataset.theme==='dark'?'light':'dark';
        root.dataset.theme=next;
        localStorage.setItem('openweb4.theme',next);
        document.querySelectorAll('#themeToggle').forEach(function(b){b.textContent=next==='dark'?'☀️':'🌙';});
      })()" class="theme-toggle-btn" title="切换主题">🌙</button>
    </div>
    <nav class="sidebar-nav">
      <a th:href="@{/dashboard}" class="nav-btn" th:classappend="${current == 'dashboard'} ? 'active' : ''">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span th:text="#{nav.dashboard}">仪表盘</span>
      </a>
      <a th:href="@{/news}" class="nav-btn" th:classappend="${current == 'news'} ? 'active' : ''">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>
        <span th:text="#{nav.news}">行情新闻</span>
      </a>
      <a th:href="@{/kol-tweets}" class="nav-btn" th:classappend="${current == 'kol-tweets'} ? 'active' : ''">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 4s-.7 1.9-2 3c1.6 10-7.4 16.3-16 11.6 2.4.1 4.8-.7 6.6-2-2.2 0-4-1.5-4.6-3.5.8.1 1.6.1 2.3-.1-2.4-.5-4.1-2.6-4.1-5v-.1c.7.4 1.5.7 2.3.7-2.2-1.5-2.8-4.5-1.4-6.7 2.6 3.2 6.5 5.1 10.6 5.3-.4-2 1.2-4.2 3.4-4.2 1 0 1.9.4 2.6 1.1.8-.2 1.7-.5 2.4-.9-.3.9-.9 1.7-1.7 2.2.8-.1 1.5-.3 2.2-.6-.5.8-1.2 1.5-2 2.1z"/></svg>
        <span th:text="#{nav.kolTweets}">大V推文</span>
      </a>
      <a th:href="@{/market-forecast}" class="nav-btn" th:classappend="${current == 'market-forecast'} ? 'active' : ''">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 7-8"/><path d="M14 7h6v6"/></svg>
        <span th:text="#{nav.marketForecast}">行情预测</span>
      </a>
      <a th:href="@{/market-indices}" class="nav-btn" th:classappend="${current == 'market-indices'} ? 'active' : ''">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
        <span th:text="#{nav.marketIndices}">行情指数</span>
      </a>
      <a th:href="@{/ai-chat}" class="nav-btn" th:classappend="${current == 'ai-chat'} ? 'active' : ''">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span th:text="#{nav.aiChat}">AI 对话</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-version">v1.0 · OpenWeb4</div>
      <div class="lang-switch">
        <a th:href="@{${#httpServletRequest.requestURI}(lang=zh)}" th:text="#{nav.langZh}">中文</a>
        <span>·</span>
        <a th:href="@{${#httpServletRequest.requestURI}(lang=en)}" th:text="#{nav.langEn}">EN</a>
      </div>
    </div>
    <script th:inline="none">
      (function(){
        var btns=document.querySelectorAll('#themeToggle');
        var theme=document.documentElement.dataset.theme||'dark';
        btns.forEach(function(b){b.textContent=theme==='dark'?'☀️':'🌙';});
      })();
    </script>
  </header>
</body>
</html>
